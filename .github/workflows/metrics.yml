name: Daily Workload Tracker

on:
  schedule:
    # GitHub cron uses UTC. 21:30 UTC is 05:30 in Asia/Taipei (UTC+8).
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-workload-tracker
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Generate 7-day activity chart
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node generate.js

      - name: Commit chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workload-chart.svg
          git diff --cached --quiet || git commit -m "chore: update code activity"
          git push
